# Printed by install.sh, never applied automatically (see DECISIONS.md).
# Route WebSocket upgrades and NIP-11 requests to strfry; everything else
# (towncrier, /api) to steward. Forward the real client IP so steward's
# per-IP API rate limit sees real clients.

map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

server {
	listen 443 ssl;
	server_name your-relay-domain.example;

	location / {
		if ($http_accept = "application/nostr+json") {
			proxy_pass http://strfry:7777;
			break;
		}
		if ($http_upgrade = "websocket") {
			proxy_pass http://strfry:7777;
			break;
		}
		proxy_pass http://steward:8787;
	}

	location /api {
		proxy_pass http://steward:8787;
	}

	proxy_http_version 1.1;
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Connection $connection_upgrade;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
