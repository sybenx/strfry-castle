# Docker-compose fragment for the Castle. This is written to be READ and
# copied into an existing strfry Portainer stack, not applied blind —
# install.sh prints the merge instructions rather than editing anyone's
# stack (see DECISIONS.md, "install.sh editing strfry.conf / compose /
# proxy configs" — rejected).
#
# strfry itself is expected to already exist in the target stack, stock,
# unmodified — the castle needs no strfry.conf changes and no plugin
# volume; it only reaches strfry via `docker exec` (steward's docker.sock
# mount) and the relay websocket.
#
# The `strfry` service below is the SCRATCH stack `make smoke` boots, not a
# copy-paste target. deploy/smoke-conf/ holds a full bootable config (stock
# dockurr/strfry defaults with a couple of scratch-only overrides) reached
# via $STRFRY_CONFIG rather than bind-mounting over /etc/strfry.conf
# directly.
services:
  strfry:
    image: dockurr/strfry:latest
    container_name: strfry
    environment:
      STRFRY_CONFIG: /config/strfry.conf
    volumes:
      - strfry-data:/app/strfry-db
      - ./smoke-conf:/config:ro
    ports:
      - "7777:7777"

  steward:
    # Published image lands with the Phase 7 release workflow
    # (ghcr.io/sybenx/castle-steward). Until then, `make smoke` builds and
    # runs the steward binary directly rather than through this service.
    image: ghcr.io/sybenx/castle-steward:latest
    depends_on:
      - strfry
    environment:
      OWNER_PUBKEY: ${OWNER_PUBKEY}
      STRFRY_CONTAINER: strfry
      PUBLIC_RELAYS: ${PUBLIC_RELAYS:-}
      OUTER_TTL_DAYS: ${OUTER_TTL_DAYS:-30}
      CYCLE_MINUTES: ${CYCLE_MINUTES:-10}
      RAID_CRON: ${RAID_CRON:-}
      RAID_DRY_RUN: ${RAID_DRY_RUN:-true}
      MAX_INVITES: ${MAX_INVITES:-5}
      MAX_DEPTH: ${MAX_DEPTH:-4}
      LISTEN: ${LISTEN:-:8787}
    volumes:
      - castle-state:/state
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8787:8787"

volumes:
  strfry-data:
  castle-state:
    # Pinned so the compose default name isn't project-directory-dependent.
    name: castle-state

networks:
  default:
    # Pinned so deploy/smoke.sh's one-shot steward container can join this
    # exact network and resolve the strfry service by its container_name.
    name: castle-smoke
